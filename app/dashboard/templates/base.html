<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block page_title %}{{ title }}{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #252840;
      --border: #2e3155;
      --accent: #6c8bef;
      --accent-hover: #8ba4f7;
      --text: #e2e4f0;
      --text-muted: #8b8fa8;
      --success: #4ade80;
      --warning: #fbbf24;
      --error: #f87171;
      --pending: #60a5fa;
    }

    /* Light theme (C5) */
    body.light {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface2: #eef0f7;
      --border: #d1d5e0;
      --accent: #4a6de0;
      --accent-hover: #3558c8;
      --text: #1a1d2e;
      --text-muted: #5a5f7a;
      --success: #16a34a;
      --warning: #d97706;
      --error: #dc2626;
      --pending: #2563eb;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .sidebar-header p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-nav {
      padding: 8px;
      flex: 1;
    }

    .note-item {
      display: block;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 4px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }

    .note-item:hover {
      background: var(--surface2);
      border-color: var(--border);
      text-decoration: none;
    }

    .note-item.active {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .note-item-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Main content */
    .main {
      flex: 1;
      padding: 32px 40px;
      max-width: 900px;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-pending   { background: rgba(96,165,250,0.15); color: var(--pending); }
    .badge-processing { background: rgba(251,191,36,0.15); color: var(--warning); }
    .badge-complete  { background: rgba(74,222,128,0.15); color: var(--success); }
    .badge-failed    { background: rgba(248,113,113,0.15); color: var(--error); }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge-pending .badge-dot,
    .badge-processing .badge-dot { animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Markdown content */
    .prose { max-width: 760px; }
    .prose h1 { font-size: 1.7rem; margin-bottom: 8px; }
    .prose h2 { font-size: 1.25rem; margin-top: 32px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .prose h3 { font-size: 1.05rem; margin-top: 20px; margin-bottom: 8px; }
    .prose p { margin-bottom: 12px; }
    .prose ul, .prose ol { padding-left: 24px; margin-bottom: 12px; }
    .prose li { margin-bottom: 4px; }
    .prose a { color: var(--accent); }
    .prose a:hover { color: var(--accent-hover); }
    .prose code {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.875em;
      font-family: "JetBrains Mono", "Fira Code", monospace;
    }
    .prose pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    .prose pre code { background: none; border: none; padding: 0; }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .prose th, .prose td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .prose th { background: var(--surface2); font-weight: 600; }
    .prose blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--border); text-decoration: none; color: var(--text); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); color: #fff; }
    .btn-danger { background: rgba(248,113,113,0.12); border-color: var(--error); color: var(--error); }
    .btn-danger:hover { background: rgba(248,113,113,0.25); color: var(--error); text-decoration: none; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 64px 32px;
      color: var(--text-muted);
    }
    .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text); }

    /* Misc */
    .meta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; }
      .main { padding: 20px 16px; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <h1>{{ title }}</h1>
        {# Light/dark mode toggle (C5) #}
        <button id="theme-toggle"
                title="Toggle light/dark mode"
                onclick="toggleTheme()"
                style="background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 2px 4px; color: var(--text-muted);">
          ☀
        </button>
      </div>
      <p>Local research dashboard</p>
    </div>
    <div class="sidebar-nav">
      <a href="/analytics" style="
        display: block;
        padding: 7px 12px;
        border-radius: 6px;
        margin-bottom: 8px;
        font-size: 0.82rem;
        color: var(--text-muted);
        border: 1px solid transparent;
        transition: background 0.15s;
      " onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
        📊 Analytics
      </a>
      {% block sidebar_notes %}{% endblock %}
    </div>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
<script>
  // Light/dark mode (C5) — persisted in localStorage
  function applyTheme(theme) {
    document.body.classList.toggle("light", theme === "light");
    const btn = document.getElementById("theme-toggle");
    if (btn) btn.textContent = theme === "light" ? "☽" : "☀";
  }
  function toggleTheme() {
    const current = localStorage.getItem("theme") === "light" ? "light" : "dark";
    const next = current === "light" ? "dark" : "light";
    localStorage.setItem("theme", next);
    applyTheme(next);
  }
  // Apply saved theme on load
  applyTheme(localStorage.getItem("theme") || "dark");
</script>
</body>
</html>
